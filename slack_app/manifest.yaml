# Mnemo — Slack app manifest. Create the app at https://api.slack.com/apps
# ("Create New App" -> "From a manifest"), paste this, then install to your
# workspace. Socket Mode is enabled so no public URL is needed for judging.
display_information:
  name: Mnemo
  description: A Slack teammate with long-term memory.
  background_color: "#1f2d3d"
features:
  bot_user:
    display_name: mnemo
    always_online: true
  assistant_view:
    assistant_description: "Tell me things to remember, or ask what I know — I keep context small and cheap."
  slash_commands:
    - command: /remember
      description: Save something to Mnemo's memory
      usage_hint: "[fact to remember]"
      should_escape: false
    - command: /recall
      description: Recall what Mnemo knows about a topic
      usage_hint: "[query]"
      should_escape: false
    - command: /sleep
      description: Consolidate and prune memories (sleep-time pass)
      should_escape: false
  shortcuts:
    - name: Remember this
      type: message
      callback_id: remember_message
      description: Save this message to Mnemo's memory
oauth_config:
  scopes:
    bot:
      - assistant:write
      - chat:write
      - commands
      - im:history
      - app_mentions:read
      - channels:history
settings:
  event_subscriptions:
    bot_events:
      - assistant_thread_started
      - assistant_thread_context_changed
      - message.im
      - app_mention
  interactivity:
    is_enabled: true
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
