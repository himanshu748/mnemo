<svg viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" font-family="Menlo, Consolas, monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b95a7"/>
    </marker>
    <marker id="arrPink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f472b6"/>
    </marker>
  </defs>

  <rect width="1280" height="800" fill="#0c0e13"/>
  <text x="48" y="52" fill="#e6e9ef" font-size="26" font-weight="bold">Mnemo — architecture</text>
  <text x="48" y="78" fill="#8b95a7" font-size="14">A Slack teammate with long-term memory · Slack Agent Builder Challenge · track: New Slack Agent</text>

  <!-- Slack column -->
  <rect x="48" y="120" width="290" height="492" rx="12" fill="#151a24" stroke="#2b3446"/>
  <text x="70" y="152" fill="#36c5f0" font-size="16" font-weight="bold">Slack workspace</text>
  <text x="70" y="172" fill="#8b95a7" font-size="12">Slack AI capabilities (required tech)</text>

  <rect x="70" y="192" width="246" height="64" rx="8" fill="#0f1420" stroke="#36c5f0"/>
  <text x="86" y="218" fill="#e6e9ef" font-size="13" font-weight="bold">AI Assistant pane</text>
  <text x="86" y="238" fill="#8b95a7" font-size="12">chat with memory + live status</text>

  <rect x="70" y="268" width="246" height="84" rx="8" fill="#0f1420" stroke="#2b3446"/>
  <text x="86" y="292" fill="#e6e9ef" font-size="13" font-weight="bold">Slash commands</text>
  <text x="86" y="312" fill="#8b95a7" font-size="12">/remember · /recall · /sleep</text>
  <text x="86" y="330" fill="#8b95a7" font-size="12">explicit memory controls</text>

  <rect x="70" y="364" width="246" height="64" rx="8" fill="#0f1420" stroke="#2b3446"/>
  <text x="86" y="388" fill="#e6e9ef" font-size="13" font-weight="bold">"Remember this" shortcut</text>
  <text x="86" y="408" fill="#8b95a7" font-size="12">save any message to memory</text>

  <rect x="70" y="440" width="246" height="64" rx="8" fill="#0f1420" stroke="#2b3446"/>
  <text x="86" y="464" fill="#e6e9ef" font-size="13" font-weight="bold">@mnemo in channels</text>
  <text x="86" y="484" fill="#8b95a7" font-size="12">shared, channel-scoped memory</text>

  <rect x="70" y="516" width="246" height="80" rx="8" fill="#0f1420" stroke="#f472b6"/>
  <text x="86" y="540" fill="#f472b6" font-size="13" font-weight="bold">/mnemo-token</text>
  <text x="86" y="560" fill="#8b95a7" font-size="12">mints a token for the MCP</text>
  <text x="86" y="578" fill="#8b95a7" font-size="12">client below (Claude Desktop/Code)</text>

  <!-- Socket mode arrow -->
  <line x1="338" y1="330" x2="430" y2="330" stroke="#8b95a7" stroke-width="2" marker-end="url(#arr)" marker-start="url(#arr)"/>
  <text x="384" y="312" fill="#8b95a7" font-size="12" text-anchor="middle">Socket Mode</text>
  <text x="384" y="352" fill="#5c677a" font-size="11" text-anchor="middle">outbound WSS</text>
  <text x="384" y="368" fill="#5c677a" font-size="11" text-anchor="middle">· no public URL</text>

  <!-- HF Space container -->
  <rect x="430" y="120" width="540" height="560" rx="12" fill="#151a24" stroke="#2b3446"/>
  <text x="452" y="152" fill="#fbbf24" font-size="16" font-weight="bold">Hugging Face Space (Docker, 24/7)</text>
  <text x="452" y="172" fill="#8b95a7" font-size="12">launcher.py — bot thread + one ASGI app (health + MCP) on :7860</text>

  <!-- two surfaces, one engine -->
  <rect x="452" y="192" width="240" height="96" rx="8" fill="#0f1420" stroke="#36c5f0"/>
  <text x="466" y="216" fill="#e6e9ef" font-size="13" font-weight="bold">Bolt app</text>
  <text x="466" y="234" fill="#8b95a7" font-size="11">slack_app/app.py</text>
  <text x="466" y="252" fill="#8b95a7" font-size="11">Assistant · commands ·</text>
  <text x="466" y="268" fill="#8b95a7" font-size="11">shortcut · mentions</text>

  <rect x="704" y="192" width="244" height="96" rx="8" fill="#0f1420" stroke="#f472b6"/>
  <text x="718" y="216" fill="#e6e9ef" font-size="13" font-weight="bold">MCP server</text>
  <text x="718" y="234" fill="#8b95a7" font-size="11">mnemo/mcp_server.py</text>
  <text x="718" y="252" fill="#8b95a7" font-size="11">remember·recall·chat·sleep</text>
  <text x="718" y="268" fill="#8b95a7" font-size="11">tools, token-authenticated</text>

  <text x="700" y="304" fill="#5c677a" font-size="11" text-anchor="middle">one shared namespace: team:user:U123 / team:channel:C456</text>
  <line x1="572" y1="288" x2="700" y2="318" stroke="#8b95a7" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="826" y1="288" x2="700" y2="318" stroke="#8b95a7" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="452" y="318" width="496" height="226" rx="8" fill="#0f1420" stroke="#34d399"/>
  <text x="468" y="342" fill="#34d399" font-size="14" font-weight="bold">Mnemo memory engine (mnemo/) — no Slack deps</text>
  <text x="468" y="366" fill="#e6e9ef" font-size="12" font-weight="bold">① Budget-aware recall</text>
  <text x="484" y="382" fill="#8b95a7" font-size="11">rank by relevance × importance, greedy-pack into a hard</text>
  <text x="484" y="397" fill="#8b95a7" font-size="11">token budget — reply shows tokens used + % compression</text>
  <text x="468" y="416" fill="#e6e9ef" font-size="12" font-weight="bold">② Write-back</text>
  <text x="484" y="432" fill="#8b95a7" font-size="11">each exchange stored as episodic memory w/ salience score</text>
  <text x="468" y="451" fill="#e6e9ef" font-size="12" font-weight="bold">③ Sleep-time pass (/sleep)</text>
  <text x="484" y="467" fill="#8b95a7" font-size="11">agreeing clusters → one LLM-summarized semantic fact;</text>
  <text x="484" y="482" fill="#8b95a7" font-size="11">stale low-value memories decay and are pruned (forgetting)</text>
  <text x="468" y="501" fill="#f472b6" font-size="12" font-weight="bold">④ Conflict detection (NEW)</text>
  <text x="484" y="517" fill="#8b95a7" font-size="11">same cluster, different values (time/date/person) → flagged</text>
  <text x="484" y="532" fill="#8b95a7" font-size="11">to the channel instead of silently merged — team resolves it</text>

  <line x1="700" y1="544" x2="700" y2="562" stroke="#8b95a7" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="452" y="562" width="496" height="98" rx="8" fill="#0f1420" stroke="#2b3446"/>
  <text x="468" y="588" fill="#e6e9ef" font-size="13" font-weight="bold">Persistence (per namespace)</text>
  <text x="468" y="606" fill="#8b95a7" font-size="12">JSON store on local disk · saved after every write</text>
  <text x="468" y="624" fill="#8b95a7" font-size="12">+ snapshot sync → private HF dataset, restored on reboot</text>
  <text x="468" y="644" fill="#5c677a" font-size="11">(MNEMO_HF_DATASET + HF_TOKEN)</text>

  <!-- right column -->
  <rect x="1010" y="192" width="222" height="116" rx="12" fill="#151a24" stroke="#f472b6"/>
  <text x="1030" y="218" fill="#f472b6" font-size="13" font-weight="bold">MCP client</text>
  <text x="1030" y="238" fill="#8b95a7" font-size="11">Claude Desktop / Code /</text>
  <text x="1030" y="254" fill="#8b95a7" font-size="11">any MCP-capable agent</text>
  <text x="1030" y="278" fill="#8b95a7" font-size="11">same memory as Slack —</text>
  <text x="1030" y="294" fill="#8b95a7" font-size="11">auth: token from /mnemo-token</text>
  <line x1="948" y1="240" x2="1010" y2="240" stroke="#f472b6" stroke-width="2" marker-end="url(#arrPink)" marker-start="url(#arrPink)"/>

  <rect x="1010" y="332" width="222" height="212" rx="12" fill="#151a24" stroke="#2b3446"/>
  <text x="1030" y="360" fill="#c084fc" font-size="14" font-weight="bold">LLM (pluggable)</text>
  <text x="1030" y="384" fill="#8b95a7" font-size="12">OpenAI-compatible API:</text>
  <text x="1030" y="408" fill="#e6e9ef" font-size="12">· Gemini Flash (default)</text>
  <text x="1030" y="428" fill="#e6e9ef" font-size="12">· OpenAI / Qwen</text>
  <text x="1030" y="448" fill="#e6e9ef" font-size="12">· offline fallback (no key)</text>
  <text x="1030" y="478" fill="#8b95a7" font-size="12">chat = answer + consolidate</text>
  <text x="1030" y="498" fill="#8b95a7" font-size="12">+ agree/conflict classify</text>
  <text x="1030" y="518" fill="#8b95a7" font-size="12">embeddings = recall ranking</text>

  <line x1="948" y1="438" x2="1010" y2="438" stroke="#8b95a7" stroke-width="2" marker-end="url(#arr)" marker-start="url(#arr)"/>

  <!-- HF dataset -->
  <rect x="1010" y="576" width="222" height="80" rx="12" fill="#151a24" stroke="#2b3446"/>
  <text x="1030" y="604" fill="#fbbf24" font-size="13" font-weight="bold">HF dataset (private)</text>
  <text x="1030" y="624" fill="#8b95a7" font-size="12">memory snapshots —</text>
  <text x="1030" y="642" fill="#8b95a7" font-size="12">survives Space rebuilds</text>
  <line x1="948" y1="608" x2="1010" y2="608" stroke="#8b95a7" stroke-width="2" marker-end="url(#arr)" marker-start="url(#arr)"/>

  <!-- keep-alive -->
  <rect x="430" y="712" width="540" height="56" rx="12" fill="#151a24" stroke="#2b3446"/>
  <text x="452" y="736" fill="#e6e9ef" font-size="13" font-weight="bold">GitHub Action keep-alive</text>
  <text x="452" y="754" fill="#8b95a7" font-size="12">cron ping on the health endpoint — keeps the free Space up for judging</text>
  <line x1="700" y1="712" x2="700" y2="682" stroke="#5c677a" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arr)"/>
</svg>
