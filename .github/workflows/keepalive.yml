name: keep-space-awake

# Free HF Spaces sleep after 48h without traffic; judging runs Jul 14 - Aug 6.
# Ping the health endpoint every 6 hours so Mnemo stays up (and alert loudly
# in the Actions tab if it ever stops answering).

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Mnemo health endpoint
        run: |
          body=$(curl -sS --max-time 60 --retry 3 --retry-delay 20 \
                 https://himanshukumarjha-mnemo.hf.space/)
          echo "response: $body"
          echo "$body" | grep -q "Mnemo is running"
